<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="btn.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="container__h1">
            <h1 class="h1">Cadastre-se já</h1>
        </div>
        <div class="container__form">
            <form action="#" class="form">
                <div class="form__name">
                    <label for="name" class="label label__name">Nome:</label>
                    <input type="text" class="input input__name" id="name" placeholder="Digite aqui o seu nome:">
                    <label for="surname" class="label label__surname">Sobrenome:</label>
                    <input type="text" class="input input__surname" id="surname" placeholder="Digite aqui o seu nome:">
                </div>
                <div class="form__email">
                    <label for="email" class="label label__email">Email:</label>
                    <input type="email" class="input input__email" id="email" placeholder="Digite aqui o seu email:">
                    <label for="cmail" class="label label__surname">Confirme seu email:</label>
                    <input type="email" class="input input__cemail" id="cemail" placeholder="Digite aqui o seu email:">
                </div>
                <div class="form__password">
                    <label for="form__password" class="label label__password">Senha:</label>
                    <input type="password" class="input input__password" id="password" placeholder="Digite aqui a sua senha:">
                    <label for="cpassword" class="label label__cpassword">Confirme sua senha:</label>
                    <input type="password" class="input input__cpassowrd" id="cpassword" placeholder="Digite aqui a sua senha:">
                </div>
            </form>
        </div>
    </div>
</body>

</html>
